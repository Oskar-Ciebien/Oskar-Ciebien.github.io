<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Professional CV - Senior Software Engineer"
    />
    <meta name="author" content="First Last" />
    <title>First Last | Senior Software Engineer</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>

  <body>
    <!-- NAV -->
    <nav class="navbar">
      <div class="navbar-container">
        <div class="nav-links">
          <a href="#socials">Socials</a>
          <a href="#experience">Experience</a>
          <a href="#projects">Projects</a>
        </div>

        <button id="theme-toggle" aria-label="Toggle theme">
          <!-- SVG injected by JS -->
        </button>
      </div>
    </nav>

    <div class="page">
      <!-- HERO -->
      <header class="hero">
        <img
          class="avatar"
          src="https://avatars.githubusercontent.com/u/48316434?v=4"
          alt="Profile photo"
        />

        <h1>Oskar Ciebien</h1>
        <h2>Senior Software Engineer</h2>

        <p>
          Software engineer with <span id="yearsOfExperience"></span>+ years of
          experience building scalable full-stack systems and performant web
          applications.
        </p>

        <div id="socials" class="section socials-section">
          <a
            class="social-link"
            href="https://github.com/Oskar-Ciebien"
            target="_blank"
          >
            <img
              class="icon github-icon"
              src="./assets/images/github-dark.png"
              alt="GitHub"
            />
            GitHub

            <span class="arrow">
              <svg viewBox="0 0 24 24">
                <path
                  d="M7 17L17 7M17 7H9M17 7V15"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </span>
          </a>

          <a
            class="social-link"
            href="https://www.linkedin.com/in/oskar-ciebien/"
            target="_blank"
          >
            <img
              class="icon linkedin-icon"
              src="./assets/images/linkedin-dark.png"
              alt="LinkedIn"
            />
            LinkedIn
            <span class="arrow">
              <svg viewBox="0 0 24 24">
                <path
                  d="M7 17L17 7M17 7H9M17 7V15"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </span>
          </a>
        </div>
      </header>

      <!-- EXPERIENCE -->
      <section id="experience" class="section">
        <h2 class="section-title">Experience</h2>
        <div id="experience-list"></div>
      </section>

      <!-- PROJECTS -->
      <section id="projects" class="section">
        <h2 class="section-title">Projects</h2>
        <div id="projects-list"></div>
      </section>

      <!-- FOOTER -->
      <footer class="footer">
        <p>© <span>Oskar Ciebien</span></p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
